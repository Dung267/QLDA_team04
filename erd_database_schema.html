const { svg } = await mermaid.render('erd-svg', src);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd .node').forEach(node => {
  const fp = node.querySelector('path[d]');
  if (!fp) return;
  const d = fp.getAttribute('d'), nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0],nums[2],nums[4],nums[6]], ys = [nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x);rect.setAttribute('y',y);rect.setAttribute('width',w);rect.setAttribute('height',h);rect.setAttribute('rx','8');
  for(const a of ['fill','stroke','stroke-width','class','style']) if(fp.hasAttribute(a)) rect.setAttribute(a,fp.getAttribute(a));
  fp.replaceWith(rect);
});
document.querySelectorAll('#erd .row-rect-odd path,#erd .row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
