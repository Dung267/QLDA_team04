<div class="card border-0 shadow-sm mb-3">
  <div class="card-body">
    <form method="get" class="row g-2 align-items-end">
      <div class="col-12 col-md-5">
        <label for="district" class="form-label mb-1">Chon khu vuc Da Nang</label>
        <select id="district" name="district" class="form-select">
          {% for value, label in district_options %}
          <option value="{{ value }}" {% if value == district %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12 col-md-auto">
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-funnel me-1"></i> Loc du lieu
        </button>
      </div>
    </form>
  </div>
</div>
