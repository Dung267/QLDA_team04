{% extends "base.html" %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-4" style="background:linear-gradient(135deg,#1a2035 0%,#0d6efd 100%)">
  <div class="card shadow-lg" style="width:500px; border-radius:16px; border:none">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-person-plus fs-1 text-primary"></i>
        <h4 class="fw-bold mt-2 mb-0">Đăng ký tài khoản</h4>
        <small class="text-muted">Tạo tài khoản người dân</small>
      </div>
      <form method="post">
        {% csrf_token %}
        <div class="row g-2">
          <div class="col-6"><label class="form-label small fw-semibold">Họ</label><input name="last_name" class="form-control form-control-sm" placeholder="Họ"></div>
          <div class="col-6"><label class="form-label small fw-semibold">Tên</label><input name="first_name" class="form-control form-control-sm" placeholder="Tên"></div>
          <div class="col-12"><label class="form-label small fw-semibold">Tên đăng nhập *</label><input name="username" class="form-control form-control-sm" required></div>
          <div class="col-12"><label class="form-label small fw-semibold">Email</label><input type="email" name="email" class="form-control form-control-sm"></div>
          <div class="col-12"><label class="form-label small fw-semibold">Số điện thoại</label><input name="phone" class="form-control form-control-sm"></div>
          <div class="col-6"><label class="form-label small fw-semibold">Quận/Huyện</label><input name="district" class="form-control form-control-sm"></div>
          <div class="col-6"><label class="form-label small fw-semibold">Phường/Xã</label><input name="ward" class="form-control form-control-sm"></div>
          <div class="col-6"><label class="form-label small fw-semibold">Mật khẩu *</label><input type="password" name="password1" class="form-control form-control-sm" required></div>
          <div class="col-6"><label class="form-label small fw-semibold">Xác nhận *</label><input type="password" name="password2" class="form-control form-control-sm" required></div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold mt-3">Đăng ký</button>
      </form>
      <hr><div class="text-center small">Đã có tài khoản? <a href="{% url 'accounts:login' %}">Đăng nhập</a></div>
    </div>
  </div>
</div>
{% endblock %}
