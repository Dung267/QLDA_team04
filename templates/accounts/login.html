{% extends "base.html" %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:linear-gradient(135deg,#1a2035 0%,#0d6efd 100%)">
  <div class="card shadow-lg" style="width:420px; border-radius:16px; border:none">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-buildings fs-1 text-primary"></i>
        <h4 class="fw-bold mt-2 mb-0">Đăng nhập</h4>
        <small class="text-muted">Hệ thống Quản lý Hạ tầng Đô thị</small>
      </div>
      {% if messages %}{% for m in messages %}<div class="alert alert-danger alert-dismissible py-2">{{ m }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>{% endfor %}{% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Tên đăng nhập</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập" required autofocus>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Mật khẩu</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Mật khẩu" required id="pwInput">
            <button type="button" class="btn btn-outline-secondary" onclick="togglePw()"><i class="bi bi-eye" id="pwEye"></i></button>
          </div>
        </div>
        <div class="d-flex justify-content-between mb-3">
          <div class="form-check"><input class="form-check-input" type="checkbox" name="remember_me" id="remember"><label class="form-check-label small" for="remember">Ghi nhớ</label></div>
          <a href="{% url 'accounts:forgot_password' %}" class="small">Quên mật khẩu?</a>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold">Đăng nhập</button>
      </form>
      <hr><div class="text-center small">Chưa có tài khoản? <a href="{% url 'accounts:register' %}">Đăng ký</a></div>
    </div>
  </div>
</div>
<script>function togglePw(){var i=document.getElementById('pwInput');var e=document.getElementById('pwEye');i.type=i.type==='password'?'text':'password';e.className=i.type==='password'?'bi bi-eye':'bi bi-eye-slash';}</script>
{% endblock %}
