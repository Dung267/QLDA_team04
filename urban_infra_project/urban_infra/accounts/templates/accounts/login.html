{% extends "base.html" %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
<div class="card shadow" style="width:100%;max-width:420px;border-radius:16px">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <i class="bi bi-building text-primary" style="font-size:2.5rem"></i>
      <h5 class="fw-bold mt-2">Đăng nhập hệ thống</h5>
      <p class="text-muted small">Quản lý Hạ tầng Đô thị</p>
    </div>
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label class="form-label fw-medium">Tên đăng nhập</label>{{ form.username }}</div>
      <div class="mb-3"><label class="form-label fw-medium">Mật khẩu</label>{{ form.password }}</div>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check"><input class="form-check-input" type="checkbox" name="remember_me" id="remember"><label class="form-check-label small" for="remember">Ghi nhớ</label></div>
        <a href="{% url 'accounts:forgot_password' %}" class="small text-decoration-none">Quên mật khẩu?</a>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-medium">Đăng nhập</button>
    </form>
    <hr><p class="text-center small mb-0">Chưa có tài khoản? <a href="{% url 'accounts:register' %}">Đăng ký</a></p>
  </div>
</div>
</div>
{% endblock %}
